[mod-setting-name]
nvo-debug-dump=Dump Nullius prototype info to log
nvo-strict=Strict mode (error on missing sprites)
nvo-pipe-stub-mode=Fluid-connection art
nvo-tier-pips=Tier pips on icons

[mod-setting-description]
nvo-debug-dump=Writes every Nullius building prototype (name, type, footprint, fluid connections) to factorio-current.log on startup. Use this to correct the patterns in config/buildings.lua.
nvo-strict=When enabled, a missing sprite definition stops the game load with an error instead of logging and skipping that building.
nvo-pipe-stub-mode=Cosmetic only. "On" draws an engine-native pipe stub + end-cap sized to the new building art on each fluid connection. "Off" leaves the ports bare. Fluid box positions and connections are never changed.
nvo-tier-pips=Adds a small stack of tier-coloured dots to reskinned building icons (1 dot = tier 1, 2 = tier 2, ...), matching the Artisanal Reskins style.

[string-mod-setting]
nvo-pipe-stub-mode-on=On
nvo-pipe-stub-mode-off=Off
